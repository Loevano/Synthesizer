name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref on main to build and sign"
        required: true
        default: "main"
      publish_release:
        description: "Publish a GitHub Release during manual runs"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  package-macos-release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Verify release source is on main
        shell: bash
        run: |
          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release ref must be on origin/main." >&2
            exit 1
          fi

      - name: Determine release label
        id: release-meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            echo "version_label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version_label=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate signing and notarization secrets
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          missing=()
          required=(
            APPLE_SIGNING_IDENTITY
            APPLE_DEVELOPER_ID_P12_BASE64
            APPLE_DEVELOPER_ID_P12_PASSWORD
            APPLE_API_KEY_ID
            APPLE_API_ISSUER_ID
            APPLE_API_PRIVATE_KEY
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Build packaged app
        run: ./scripts/package-app.sh "${{ steps.release-meta.outputs.version_label }}"

      - name: Sign and notarize app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: ./scripts/sign-and-notarize-app.sh build-release/Synthesizer.app "${{ steps.release-meta.outputs.version_label }}"

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synthesizer-macOS
          path: dist/*.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && steps.release-meta.outputs.version_label || github.ref_name }}
